services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: adroit_crm
      DB_USERNAME: adroit
      DB_PASSWORD: adroit
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:3000,127.0.0.1:3000
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan db:seed --class=SaasFoundationSeeder --force &&
             php artisan db:seed --class=IntegrationsSeeder --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: adroit_crm
      MYSQL_USER: adroit
      MYSQL_PASSWORD: adroit
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
